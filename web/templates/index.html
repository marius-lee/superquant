<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<title>superquant — V3 三级漏斗</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'SF Mono',monospace;background:#0d1117;color:#c9d1d9;padding:16px}
h2{font-size:16px;margin-bottom:8px;color:#58a6ff}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin-bottom:12px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.col{flex:1;min-width:280px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:6px 8px;text-align:left;border-bottom:1px solid #21262d}
th{color:#8b949e;font-weight:500}
.metric{font-size:24px;font-weight:bold}
.metric-label{font-size:11px;color:#8b949e}
.progress-bar{height:20px;background:#21262d;border-radius:10px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#e15241,#f0883e);transition:width .5s}
#status{color:#8b949e;font-size:11px}
#l3-info{font-size:12px;color:#8b949e}

/* 资本栏 (增量: 只在原配色上加) */
#capital-bar { padding:14px 20px; background:#161b22; border:1px solid #30363d; border-radius:8px; margin-bottom:12px; }
.capital-row { display:flex; align-items:center; gap:10px; }
.capital-row.secondary { margin-top:4px; font-size:13px; color:#8b949e; }
.capital-row.secondary span:last-child { color:#c9d1d9; font-weight:600; }
#capital-amount { font-size:28px; font-weight:800; }
#capital-return { font-size:16px; margin-left:auto; font-weight:600; }

/* 持仓表 (增量) */
.pos-table { width:100%; border-collapse:collapse; font-size:13px; table-layout:fixed; }
.pos-table th { text-align:left; color:#8b949e; font-weight:500; padding:6px 6px; border-bottom:2px solid #21262d; font-size:11px; }
.pos-table td { padding:6px 6px; border-bottom:1px solid #21262d; overflow:hidden; text-overflow:ellipsis; }
.pos-table td:last-child, .pos-table th:last-child { text-align:right; }
.pos-table .sub { font-size:10px; color:#8b949e; margin-top:1px; }
.pos-table .up { color:#e15241; font-weight:600; }
.pos-table .down { color:#4caf50; font-weight:600; }
</style>
</head>
<body>

<h2>superquant V3 — 三级漏斗</h2>
<div id="status">加载中...</div>

<!-- 资本栏 (旧系统风格) -->
<div id="capital-bar">
  <div class="capital-row">
    <span>💰</span>
    <span id="capital-amount">¥5,000</span>
    <span id="capital-return"></span>
  </div>
  <div class="capital-row secondary">
    <span>💵 可用</span>
    <span id="capital-available">¥5,000</span>
  </div>
  <div class="capital-row secondary">
    <span id="perf-stats" style="font-size:11px;color:#8b949e"></span>
  </div>
</div>

<div class="row">
  <div class="col">
    <div class="card">
      <div class="metric-label">北极星 ¥5000 → ¥100万</div>
      <div class="progress-bar"><div class="progress-fill" id="ns-bar" style="width:0%"></div></div>
      <div style="font-size:12px;color:var(--muted)"><span id="ns-pct">0%</span> | 剩余 <span id="ns-left">-</span></div>
    </div>
  </div>
  <div class="col">
    <div class="card">
      <div class="metric-label">市场状态</div>
      <div style="font-size:13px" id="mood-label">-</div>
    </div>
  </div>
</div>

<!-- 持仓 -->
<div id="positions-panel" style="display:none">
  <div class="card">
    <div class="metric-label">💼 持仓 <span id="pos-count"></span></div>
    <div id="position-list"></div>
  </div>
</div>

<div class="row">
  <div class="col">
    <div class="card">
      <div class="metric-label">实时信号</div>
      <table><thead><tr><th>时间</th><th>股票</th><th>信号</th><th>动作</th></tr></thead>
        <tbody id="sig-body"><tr><td colspan=4 style="color:var(--muted)">-</td></tr></tbody>
      </table>
      <div id="sig-weights" style="font-size:10px;color:var(--muted);margin-top:4px;border-top:1px solid var(--border);padding-top:4px">信号权重: -</div>
    </div>
  </div>
  <div class="col">
    <div class="card">
      <div class="metric-label">最近交易</div>
      <table><thead><tr><th>时间</th><th>股票</th><th>方向</th><th>价格</th><th>盈亏</th></tr></thead>
        <tbody id="trade-body"><tr><td colspan=5 style="color:var(--muted)">-</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="row">
  <div class="col">
    <div class="card">
      <div class="metric-label">📊 绩效指标</div>
      <div id="metrics-info" style="font-size:12px;color:#8b949e">-</div>
    </div>
  </div>
</div>

<div class="row">
  <div class="col">
    <div class="card">
      <div class="metric-label">XGBRanker 排序预测 (Rank IC=0.37)</div>
      <div id="cand-info" style="font-size:12px;color:var(--muted)">-</div>
      <div style="font-size:10px;color:var(--muted);margin:4px 0;border-left:2px solid #58a6ff;padding-left:6px">
        分数 = z-score | <b>2.5+</b>=前0.6% | <b>2.0+</b>=前2% | <b>1.0+</b>=前16%
      </div>
      <table><thead><tr><th>#</th><th>代码</th><th>名称</th><th>分数</th></tr></thead>
        <tbody id="cand-body"><tr><td colspan=4>...</td></tr></tbody>
      </table>
    </div>
  </div>
  <div class="col">
    <div class="card">
      <div class="metric-label">拒绝信号</div>
      <table><thead><tr><th>时间</th><th>股票</th><th>价格</th><th>原因</th></tr></thead>
        <tbody id="rej-body"><tr><td colspan=4 style="color:var(--muted)">-</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="row">
  <div class="col">
    <div class="card">
      <div class="metric-label">L3 回补进度</div>
      <div id="l3-info">-</div>
    </div>
  </div>
</div>

<script>
var $ = function(id) { return document.getElementById(id); };

function refresh() {
  try {
    $('status').textContent = '刷新中...';

    fetch('/api/state').then(function(r){return r.json()}).then(function(state){
      var cash = state.cash || 5000;
      var equity = state.equity || 5000;
      var initial = state.initial_capital || 5000;
      var ret = (equity / initial - 1) * 100;
      $('capital-amount').textContent = '¥' + equity.toLocaleString();
      $('capital-available').textContent = '¥' + cash.toLocaleString();
      var retEl = $('capital-return');
      retEl.textContent = (ret>=0?'+':'') + ret.toFixed(1) + '%';
      retEl.style.color = ret>=0 ? '#e15241' : '#4caf50';
      // 市场状态
      var r = state.regime;
      if (r) $('mood-label').textContent = (r.label||'') + ' · ' + (r.desc||'');
      // 绩效行
      var p = state.performance || {};
      var rp = p.realized_pnl || 0;
      var up = p.unrealized_pnl || 0;
      $('perf-stats').textContent = '已实现: ¥'+(rp>=0?'+':'')+rp.toFixed(2)+
        ' | 浮动: ¥'+(up>=0?'+':'')+up.toFixed(2)+
        ' | 总计: ¥'+(p.total_pnl>=0?'+':'')+(p.total_pnl||0).toFixed(2)+
        ' | '+(p.buy_count||0)+'买 '+(p.sell_count||0)+'卖'+
        ' | 胜率: '+(p.win_rate||0)+'%';
    }).catch(function(e){ $('status').textContent = '❌ state: '+e.message; });

    fetch('/api/positions').then(function(r){return r.json()}).then(function(ps){
      var panel = $('positions-panel');
      var list = $('position-list');
      var count = $('pos-count');
      if (!ps || ps.length===0) {
        panel.style.display = 'none';
        return;
      }
      panel.style.display = 'block';
      count.textContent = ps.length+'只';
      var h = '<table class="pos-table"><thead><tr>'+
        '<th>代码</th><th>名称</th><th>数量</th><th>成本</th><th>现价</th><th>盈亏</th><th>市值</th>'+
      '</tr></thead><tbody>';
      ps.forEach(function(p) {
        var cost = p.price || 0;
        var current = p.current || cost;
        var pnl = cost>0 ? ((current/cost - 1)*100) : 0;
        var value = p.shares * current;
        var cls = pnl>=0 ? 'up' : 'down';
        h += '<tr>'+
          '<td>'+p.symbol+'<div class="sub">'+(p.buy_date||'')+'</div></td>'+
          '<td>'+(p.name||'')+'</td>'+
          '<td>'+p.shares+'股</td>'+
          '<td>¥'+cost.toFixed(2)+'</td>'+
          '<td>¥'+current.toFixed(2)+'</td>'+
          '<td class="'+cls+'">'+(pnl>=0?'+':'')+pnl.toFixed(1)+'%</td>'+
          '<td>¥'+Math.round(value).toLocaleString()+'</td>'+
        '</tr>';
      });
      h += '</tbody></table>';
      list.innerHTML = h;
    }).catch(function(e){ $('status').textContent = '❌ pos: '+e.message; });

    fetch('/api/candidates').then(function(r){return r.json()}).then(function(cands){
      if (cands.main && cands.main.length > 0) {
        $('cand-info').textContent = cands.date + ' | ' + cands.count + '只 | ' + cands.model;
        var h = '';
        cands.main.slice(0, 20).forEach(function(c, i) {
          h += '<tr><td>' + (i+1) + '</td><td>' + c.symbol + '</td><td>' + (c.name || '?') + '</td><td>' + c.prob.toFixed(2) + '</td></tr>';
        });
        if (cands.discovery && cands.discovery.length > 0) {
          cands.discovery.forEach(function(c) {
            h += '<tr style="opacity:0.7"><td>D</td><td>' + c.symbol + '</td><td>' + (c.name || '?') + '</td><td style="color:#ffd700">' + c.prob.toFixed(2) + '</td></tr>';
          });
        }
        $('cand-body').innerHTML = h;
      }
    }).catch(function(e){ $('status').textContent = '❌ cands: '+e.message; });

    fetch('/api/northstar').then(function(r){return r.json()}).then(function(ns){
      if (ns && ns.progress_pct != null) {
        var pct = ns.progress_pct;
        $('ns-pct').textContent = (pct < 0.01 ? pct.toFixed(4) : pct < 1 ? pct.toFixed(2) : pct.toFixed(1)) + '%';
        $('ns-bar').style.width = Math.max(ns.progress_pct, 0.1) + '%';
        $('ns-left').textContent = '¥' + Math.round(ns.remaining || 0).toLocaleString();
      }
    }).catch(function(e){});

    fetch('/api/rejected').then(function(r){return r.json()}).then(function(rej){
      if (rej.rejected && rej.rejected.length > 0) {
        var h = '';
        rej.rejected.slice(0, 20).forEach(function(r) {
          h += '<tr><td>' + r.time + '</td><td>' + r.symbol + '</td><td>¥' + r.price.toFixed(2) + '</td><td style="color:#f0883e">' + r.reason + '</td></tr>';
        });
        $('rej-body').innerHTML = h;
      }
    }).catch(function(e){});

    fetch('/api/signals').then(function(r){return r.json()}).then(function(sigs){
      if (sigs && sigs.length > 0) {
        var sn = {A:'贝叶斯变点', B:'量价背离', C:'买盘堆积', D:'竞价异常'};
        var h = '';
        sigs.slice(0, 20).forEach(function(s) {
          h += '<tr><td>' + s.time + '</td><td>' + s.symbol + '</td><td style="color:#ffd700">' + (sn[s.signal] || s.signal) + '</td><td>' + s.action + '</td></tr>';
        });
        $('sig-body').innerHTML = h;
      }
    }).catch(function(e){});

    fetch('/api/signal-stats').then(function(r){return r.json()}).then(function(stats){
      if (stats) {
        var sn = {A:'变点', B:'量价', C:'堆积', D:'竞价'};
        var parts = [];
        Object.keys(stats).sort().forEach(function(k) {
          var s = stats[k];
          parts.push((sn[k]||k) + ':' + (s.win_rate*100).toFixed(0) + '%×' + s.total_count);
        });
        $('sig-weights').textContent = '权重: ' + (parts.length > 0 ? parts.join(' | ') : '暂无数据');
      }
    }).catch(function(e){});

    fetch('/api/trades').then(function(r){return r.json()}).then(function(trades){
      if (trades && trades.length > 0) {
        var h = '';
        trades.slice(0, 10).forEach(function(t) {
          var sc = t.side === 'buy' ? 'color:var(--up)' : 'color:var(--down)';
          var pc = (t.pnl || 0) > 0 ? 'color:var(--up)' : 'color:var(--down)';
          var ts = (t.time || t.date || '').replace('T',' ').slice(0, 19);
          h += '<tr><td>' + ts + '</td><td>' + t.symbol + '</td><td style="' + sc + '">' + (t.side==='buy'?'买入':'卖出') + '</td><td>¥' + t.price + '</td><td style="' + pc + '">' + (t.pnl || 0).toFixed(0) + '</td></tr>';
        });
        $('trade-body').innerHTML = h;
      }
    }).catch(function(e){});

    fetch('/api/metrics').then(function(r){return r.json()}).then(function(m){
      if (m && m.total_trades > 0) {
        $('metrics-info').textContent = '夏普:' + m.sharpe.toFixed(2) +
          ' | 回撤:' + m.max_drawdown.toFixed(1) + '%' +
          ' | 卡尔玛:' + m.calmar.toFixed(2) +
          ' | 胜率:' + m.win_rate.toFixed(0) + '%' +
          ' | 盈亏比:' + m.profit_factor.toFixed(2) +
          ' | 期望值:¥' + m.expectancy.toFixed(2) +
          ' | ' + m.total_trades + '笔';
      } else {
        $('metrics-info').textContent = '暂无平仓数据';
      }
    }).catch(function(e){});

    fetch('/api/l3-progress').then(function(r){return r.json()}).then(function(l3){
      if (l3 && l3.rows) {
        var h = l3.status + ' | <b>' + l3.days + '</b>天 / <b>' + l3.rows.toLocaleString() + '</b>条 | ' + (l3.date_range || '');
        if (l3.threads) {
          h += '<br><span style="font-size:10px;color:#8b949e">';
          Object.keys(l3.threads).forEach(function(tid) {
            var t = l3.threads[tid];
            if (t.done) {
              h += tid + ': ✅完成 ';
            } else {
              var pct = Math.round(t.cur/t.total*100);
              h += tid + ': ' + pct + '% ';
            }
          });
          h += '</span>';
        }
        $('l3-info').innerHTML = h;
      }
    }).catch(function(e){});

    $('status').textContent = '✅ ' + new Date().toLocaleTimeString();
  } catch(e) {
    $('status').textContent = '❌ ' + e.message;
  }
}
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
