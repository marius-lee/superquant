<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>superquant — 攻击性涨停捕捉</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'SF Mono', monospace; background:#0d1117; color:#c9d1d9; padding:16px; }
h2 { font-size:16px; margin-bottom:8px; color:#58a6ff; }
.card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:12px; margin-bottom:12px; }
.row { display:flex; gap:12px; flex-wrap:wrap; }
.col { flex:1; min-width:280px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th, td { padding:6px 8px; text-align:left; border-bottom:1px solid #21262d; }
th { color:#8b949e; font-weight:500; }
.up { color:#e15241; } .down { color:#4caf50; }
.buy { color:#e15241; } .sell { color:#4caf50; }
.badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:11px; }
.badge-buy { background:#e1524133; color:#e15241; }
.badge-sell { background:#4caf5033; color:#4caf50; }
.badge-active { background:#ffd70033; color:#ffd700; }
.badge-pending { background:#58a6ff33; color:#58a6ff; }
.metric { font-size:24px; font-weight:bold; }
.metric-label { font-size:11px; color:#8b949e; }
.progress-bar { height:20px; background:#21262d; border-radius:10px; overflow:hidden; margin:8px 0; }
.progress-fill { height:100%; background:linear-gradient(90deg,#e15241,#f0883e); transition:width 0.5s; }
#status { color:#8b949e; font-size:11px; }
.layer-item { display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px solid #21262d; font-size:13px; }
.layer-count { font-weight:bold; }
</style>
</head>
<body>

<h2>🚀 superquant — 攻击性涨停捕捉</h2>
<div id="status">加载中...</div>

<div class="row">
  <div class="col">
    <div class="card">
      <div class="metric-label">💰 模拟账户</div>
      <div class="metric" id="equity">¥5,000</div>
      <div style="font-size:12px;color:#8b949e">
        可用: <span id="cash">¥5,000</span> | 持仓: <span id="npos">0</span>只
      </div>
    </div>
  </div>
  <div class="col">
    <div class="card">
      <div class="metric-label">🎯 北极星进度</div>
      <div class="progress-bar"><div class="progress-fill" id="northstar-bar" style="width:0%"></div></div>
      <div style="font-size:12px;color:#8b949e">
        进度: <span id="northstar-pct">0%</span> | 距目标 <span id="ns-remaining">¥995,000</span>
      </div>
    </div>
  </div>
</div>

<div class="row">
  <div class="col">
    <div class="card">
      <div class="metric-label">🎯 ML 涨停预测 (XGBoost AUC=0.96)</div>
      <div id="candidate-info" style="font-size:12px;color:#8b949e">加载中...</div>
      <table id="candidate-table" style="margin-top:4px">
        <thead><tr><th>#</th><th>股票</th><th>P(涨停)</th></tr></thead>
        <tbody><tr><td colspan=3>待模型运行...</td></tr></tbody>
      </table>
    </div>
  </div>
  <div class="col">
    <div class="card">
      <div class="metric-label">📊 数据回补 (L3资金流)</div>
      <div id="l3-info" style="font-size:12px;color:#8b949e">加载中...</div>
    </div>
  </div>
</div>

<div class="row">
  <div class="col">
    <div class="card">
      <div class="metric-label">📝 最近交易</div>
      <table>
        <thead><tr><th>时间</th><th>股票</th><th>方向</th><th>价格</th><th>盈亏</th><th>原因</th></tr></thead>
        <tbody id="trades-body"><tr><td colspan=6>无交易</td></tr></tbody>
      </table>
    </div>
  </div>
  <div class="col">
    <div class="card">
      <div class="metric-label">⚙️ 系统状态</div>
      <div style="font-size:12px;color:#8b949e">
        策略: XGBoost (26特征, AUC=0.96)<br>
        数据: Sina + easy-tdx + HDF5 + AKShare (全免费)<br>
        扫描: 5s | ML每日自动更新
      </div>
    </div>
  </div>
</div>

<script>
const API='';
function $(id){return document.getElementById(id);}

async function refresh() {
  try {
    const [state, candidates, northstar, positions, trades, l3] = await Promise.all([
      fetch(API+'/api/state').then(r=>r.json()),
      fetch(API+'/api/candidates').then(r=>r.json()),
      fetch(API+'/api/northstar').then(r=>r.json()),
      fetch(API+'/api/positions').then(r=>r.json()),
      fetch(API+'/api/trades').then(r=>r.json()),
      fetch(API+'/api/l3-progress').then(r=>r.json()),
    ]);
    $('equity').textContent='¥'+state.equity.toLocaleString();
    $('cash').textContent='¥'+state.cash.toLocaleString();
    $('npos').textContent=state.n_positions;
    if(northstar&&northstar.progress_pct!=null){
      $('northstar-pct').textContent=northstar.progress_pct.toFixed(1)+'%';
      $('northstar-bar').style.width=Math.min(northstar.progress_pct,100)+'%';
      $('ns-remaining').textContent='¥'+Math.round(northstar.remaining||0).toLocaleString();
    }
    // ML候选 (双通道)
    if(candidates&&candidates.main&&candidates.main.length>0){
      $('candidate-info').textContent=candidates.date+' | '+candidates.count+'只候选 | '+candidates.model;
      let html='';
      candidates.main.forEach((c,i)=>{
        let cls=c.prob>0.95?'up':c.prob>0.8?'badge-active':'';
        html+='<tr><td>'+(i+1)+'</td><td>'+c.symbol+'</td><td class="'+cls+'">'+(c.prob*100).toFixed(1)+'%</td></tr>';
      });
      if(candidates.discovery&&candidates.discovery.length>0){
        candidates.discovery.forEach((c,i)=>{
          html+='<tr style="opacity:0.7"><td>🔍</td><td>'+c.symbol+'</td><td style="color:#ffd700">'+(c.prob*100).toFixed(1)+'%</td></tr>';
        });
      }
      $('candidate-table').querySelector('tbody').innerHTML=html;
    } else {
      $('candidate-info').textContent='待运行 ml/predict.py';
    }
    // L3进度
    if(l3){
      $('l3-info').innerHTML='状态: '+l3.status+' | 覆盖: '+l3.days+'天/'+l3.rows+'条<br>'+l3.date_range+' | '+l3.last_log;
    }
    // 持仓
    if(positions.length>0){
      let html='';
      positions.forEach(p=>{html+='<tr><td>'+p.symbol+'</td><td>¥'+p.price+'</td><td>'+p.shares+'</td><td><span class="badge badge-buy">'+p.reason+'</span></td></tr>';});
      $('positions-body').innerHTML=html;
    }
    // 交易
    if(trades.length>0){
      let html='';
      trades.slice(0,10).forEach(t=>{
        let sideCls=t.side==='buy'?'buy':'sell';
        let pnlCls=(t.pnl||0)>0?'up':'down';
        html+='<tr><td>'+(t.time||t.date).slice(0,19)+'</td><td>'+t.symbol+'</td><td class="'+sideCls+'">'+t.side+'</td><td>¥'+t.price+'</td><td class="'+pnlCls+'">'+(t.pnl||0).toFixed(0)+'</td><td>'+t.reason+'</td></tr>';
      });
      $('trades-body').innerHTML=html;
    }
    $('status').textContent='✅ 实时 '+new Date().toLocaleTimeString();
  }catch(e){
    $('status').textContent='❌ '+e.message;
  }
}
refresh();setInterval(refresh,10000);
</script>
</body>
</html>
